# Nebula DNS Server Configuration

server:
  host: "0.0.0.0"
  udp_port: 53
  tcp_port: 53
  enable_tcp: true
  timeout_seconds: 2.0

cache:
  max_entries: 10000
  ttl_seconds: 60

upstream:
  servers:
    - "1.1.1.1"
    - "1.0.0.1"

dashboard:
  host: "0.0.0.0"
  port: 8000

logging:
  file: "logs/dnsserver.log"
  level: "DEBUG"

rules:
  enable_regex: true
  
  # Manual allowlist - domains that should NEVER be blocked
  allowlist:
    - "example.com"
  
  # Manual denylist - domains that should always be blocked
  # These are checked BEFORE external blocklist files
  # 
  # Pattern types supported:
  # 1. Exact: "ads.com" - matches only "ads.com"
  # 2. Subdomain: "ads.com" - matches "ads.com" AND "sub.ads.com"
  # 3. Regex (starts with parenthesis): "(^|\.)doubleclick\.net$" - matches domain and all subdomains
  # 4. Regex: "(^|\.)googlesyndication\.com$" - matches exact pattern
  #
  denylist:
    # Exact and subdomain matches (no regex)
    - "ads.example.com"
    - "tracker.example.com"
    
    # Regex patterns - catch the domain and ALL subdomains
    - "(^|\.)doubleclick\.net$"
    - "(^|\.)googlesyndication\.com$"
    - "(^|\.)google-analytics\.com$"
    - "(^|\.)facebook\.com$"
    - "(^|\.)api\.facebook\.com$"
  
  # Per-client specific rules (by IP address)
  per_client_rules: {}
  
  # External blocklist file (one domain per line)
  blocklist_path: "blocklists/adlists.txt"
