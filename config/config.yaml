# Nebula DNS Server Configuration

server:
  host: "0.0.0.0"
  udp_port: 53
  tcp_port: 53
  enable_tcp: true
  timeout_seconds: 2.0

cache:
  max_entries: 10000
  ttl_seconds: 60

upstream:
  servers:
    - "1.1.1.1"
    - "1.0.0.1"

dashboard:
  host: "0.0.0.0"
  port: 8000

logging:
  file: "logs/dnsserver.log"
  level: "INFO"

rules:
  enable_regex: true
  allowlist: []
  denylist: []
  per_client_rules: {}
  blocklist_path: "blocklists/adlists.txt"
